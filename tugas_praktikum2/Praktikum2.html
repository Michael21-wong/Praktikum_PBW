<html>
    <head>
        <title>Praktikum 2</title>
    </head>
    <body>
        <form action="" method="post" enctype="multipart/form-data"> 
            <table>
                <tr>
                    <td><label for="Nama">Nama:</label></td>
                    <td><input type="text" name="Username" placeholder="Masukkan Nama Anda" id="Nama"></td>
                </tr>
                <tr>
                    <td><label for="Email">Email:</label></td>
                    <td><input type="text" name="Email" placeholder="Masukkan Email Anda" id="Email"></td>
                </tr>
                <tr>
                    <td><label for="Password">Password:</label></td>
                    <td><input type="text" name="Password" placeholder="Masukkan Password Anda" id="Password"></td>
                </tr>
                <tr>
                    <td>Jenis Kelamin:</td>
                    <td><label><input type="radio" name="gender" value="Laki-laki" >Laki-laki</label></td>
                    <td><label><input type="radio" name="gender" value="Perempuan" >Perempuan</label></td>
                </tr>
                <tr>
                    <td>Hobby:</td>
                    <td><label><input type="checkbox" name="Hobby" value="Musik">Musik</label></td>
                    <td><label><input type="checkbox" name="Hobby" value="Olahraga">Olahraga</label></td>
                    <td><label><input type="checkbox" name="Hobby" value="Memasak">Memasak</label></td>
                </tr>
                <tr>
                    <td><label for="Kota">Pilih Kota:</label></td>
                    <td><select name="Kota" id="Kota">
                        <option value="jkt">Jakarta</option>
                        <option value="krw">Karawang</option>
                        <option value="sby">Surabaya</option>
                        <option value="pwk">Purwakarta</option>
                        <option value="bks">Bekasi</option>
                    </select></td>
                </tr>
                <tr>
                    <td><label for="file">Upload Foto:</label></td>
                    <td><input type="file" id="file" name="file" accept=".png, .jpg, .jpeg"></td>
                </tr>
                <tr>
                    <td><button type="submit">Daftar</button></td>
                </tr>
            </table>
    </form>
    <label for=""></label>
    </body>
</html>
